<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Face Recognition prototype</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
  <h1>Face Detection prototype</h1>

  <div class="grid">
    <div class="card">
      <h2>Add a new person</h2>
      <form id="enrollForm">
        <div class="row">
          <input type="text" name="name" placeholder="Имя, например: Иван Петров" required />
          <input type="file" name="files" id="photos" accept="image/*" multiple required />
          <button type="submit">Upload</button>
        </div>
      </form>
      <div id="enrollResult" class="muted"></div>
    </div>

    <div class="card">
      <h2>Real time</h2>
      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay" class="overlay"></canvas>
      </div>
      <div class="controls">
        <button id="startBtn">Start Camera</button>
        <button id="stopBtn" class="secondary">Stop</button>
      </div>
      <div id="liveStatus" class="muted status"></div>
    </div>
  </div>

  <div class="card spacer">
    <h2>Base</h2>
    <table>
      <thead>
        <tr><th>Name</th><th>Samples</th></tr>
      </thead>
      <tbody id="peopleBody"></tbody>
    </table>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
